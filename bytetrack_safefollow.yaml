tracker_type: bytetrack

track_high_thresh: 0.40   # min confidence to start a new track
track_low_thresh:  0.15   # low-confidence detections still used to keep existing tracks alive
new_track_thresh:  0.50   # min confidence to initialise a brand-new track ID

track_buffer: 90          # frames to keep a lost track before dropping its ID (~9s at 10fps)
match_thresh:  0.85       # IoU threshold for matching detections to existing tracks
